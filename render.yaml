services:
  # Backend Server
  - type: web
    name: dojo-demo-server
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: PORT
        value: 10000
      - key: VITE_MP_ACCESS_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false # Will be set manually in Render Dashboard

  # Frontend Client
  - type: static
    name: dojo-demo-client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: client
    envVars:
      - key: VITE_API_URL
        sync: false # Will be set manually in Render Dashboard
      - key: VITE_MP_PUBLIC_KEY
        sync: false
